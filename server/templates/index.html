<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Smart Queue Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .header { background: #1a73e8; color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .kiosk { border-left: 8px solid #e67e22; }
        .counter-section { border-left: 8px solid #34a853; }
        .number { font-size: 60px; font-weight: bold; color: #d93025; margin: 10px 0; }
        .label { font-size: 18px; color: #5f6368; font-weight: bold; }
        .counter-row { display: flex; justify-content: space-between; align-items: center; 
                       background: #f8f9fa; margin: 10px 0; padding: 15px; border-radius: 8px; font-size: 18px; border: 1px solid #ddd; }
        
        .btn { border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-next { background: #34a853; color: white; width: 100%; }
        .btn-next:hover { background: #2d8e47; opacity: 0.9; }
        
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        .badge { background: #1a73e8; color: white; padding: 4px 12px; border-radius: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>HỆ THỐNG QUẢN LÝ HÀNG ĐỢI</h1>
        <p>Điều khiển và theo dõi trạng thái thời gian thực</p>
    </div>

    <div class="container">
        <!-- Khu vực Kiosk -->
        <div class="card kiosk">
            <div class="label">SỐ VỪA PHÁT (KIOSK)</div>
            <div id="last-ticket" class="number">000</div>
            <hr>
            <div class="label">KHÁCH ĐANG ĐỢI</div>
            <div id="total-waiting" class="number" style="color: #1a73e8; font-size: 45px;">0</div>
            <p style="color: #888; font-size: 13px;">(Cập nhật tự động từ ESP32-C3)</p>
        </div>

        <!-- Khu vực Các Quầy -->
        <div class="card counter-section">
            <div class="label">ĐIỀU KHIỂN GỌI SỐ</div>
            <div id="counters-list" style="margin-top: 15px;">
                <p>Đang chờ quầy kết nối...</p>
            </div>
        </div>
    </div>

    <script>
        // 1. Tải dữ liệu từ Flask và cập nhật UI
        async function loadData() {
            try {
                const res = await fetch("/dashboard");
                const data = await res.json();

                // Cập nhật thẻ Kiosk
                document.getElementById("last-ticket").innerText = data.last_ticket.toString().padStart(3, '0');
                document.getElementById("total-waiting").innerText = data.total_waiting;

                // Cập nhật danh sách quầy
                let html = "";
                const counters = data.counters;
                const counterKeys = Object.keys(counters); // Ví dụ: ["Counter_1", "Counter_2"]

                if (counterKeys.length === 0) {
                    html = "<p style='color:#999; padding: 20px;'>Chưa có quầy nào gửi báo cáo.</p>";
                } else {
                    counterKeys.forEach(cidStr => {
                        // Trích xuất số từ chuỗi "Counter_1" -> lấy số 1 -> trừ 1 để ra ID 0 cho ESP32
                        const counterIdInt = parseInt(cidStr.split('_')[1]) - 1;
                        
                        html += `
                            <div class="counter-row">
                                <div style="text-align: left;">
                                    <span class="badge">${cidStr}</span> 
                                    <div style="font-size: 28px; font-weight: bold; color:#34a853; margin-top: 5px;">
                                        #${counters[cidStr].toString().padStart(3, '0')}
                                    </div>
                                </div>
                                <div style="width: 40%;">
                                    <button class="btn btn-next" onclick="sendNextCommand(${counterIdInt})">GỌI TIẾP</button>
                                </div>
                            </div>`;
                    });
                }
                document.getElementById("counters-list").innerHTML = html;
            } catch (err) {
                console.error("Lỗi cập nhật Dashboard:", err);
            }
        }

        // 2. Gửi lệnh NEXT tới Server
        async function sendNextCommand(id) {
            try {
                const response = await fetch("/control", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        counter_id: id,      // Gửi số nguyên (0, 1, 2...)
                        action: "next"       // Hành động duy nhất là next
                    })
                });
                
                if (response.ok) {
                    console.log(`Đã xếp hàng lệnh NEXT cho Quầy ${id + 1}`);
                    // Không cần loadData() ngay vì setInterval sẽ tự cập nhật sau khi ESP32 xử lý xong
                }
            } catch (err) {
                alert("Lỗi kết nối Server!");
            }
        }

        // Tự động cập nhật mỗi 2 giây
        setInterval(loadData, 2000);
        // Chạy lần đầu ngay khi load trang
        loadData();
    </script>
</body>
</html>
